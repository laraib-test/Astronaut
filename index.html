<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Explorer Profile</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="profile-card">
    <h1 id="explorer-name" title="Double-click to rename!">Commander Alex</h1>
    <p class="explorer-title">Astronaut in Training 🚀</p>
    <ul class="explorer-stats">
      <li>🪐 Favourite planet: <strong>Pluto</strong></li>
      <li>🌙 Moon landings: <strong>0 (so far!)</strong></li>
      <li>⭐ Skills: <strong>HTML · CSS · JavaScript</strong></li>
    </ul>
    <button id="launch-btn">✨ Launch Mission</button>
    <p id="mission-status"></p>
  </div>
</body>
</html>
